name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一ブランチで新しいコミットが来たら古い実行をキャンセルする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks (lint + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ローカル・claude.yml と共通の品質ゲート
      - name: Run quality checks
        run: bash scripts/quality-check.sh
